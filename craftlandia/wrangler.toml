name = "craftlandia-ugyfelkapu"
main = "worker.js"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

# ─── D1 Database ───────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "craftlandia_db"
database_id   = "d7715f87-7631-4fe3-ba0d-32dc943a3b3b"   # wrangler d1 create craftlandia-db

# ─── Environment variables (set via wrangler secret) ────────
# wrangler secret put DISCORD_CLIENT_SECRET
# wrangler secret put JWT_SECRET

# ─── Static assets (optional – use Cloudflare Pages instead)
# [site]
# bucket = "./public"


# ─── Build ──────────────────────────────────────────────────
[build]
command = ""

# ─── Dev settings ───────────────────────────────────────────
[dev]
port = 8787
local_protocol = "http"

# ─── Observability ──────────────────────────────────────────
[observability.logs]
enabled = false
invocation_logs = true
